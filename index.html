<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gestor de Identidad</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <header>
      <h1 id="saludo"></h1>
      <div id="reloj"></div>
      <button id="btn-modo-oscuro">Alternar Modo Oscuro</button>
      <div id="monitor-ventana" style="margin-top: 20px; font-family: monospace;">
        Resolución actual: <span id="window-width"></span>px de ancho x <span id="window-height"></span>px de alto
      </div>
    </header>

    <main>
      <section class="seccion-motivacion">
        <h2>Mensaje del dia</h2>
        <button id="btn-frase">Generar frase</button>
        <p>
          <strong id="categoria-frase">Categoria</strong>:
          <span id="texto-frase">Pulsa el boton para ver un mensaje.</span>
        </p>
      </section>

      <section class="seccion-tareas">
        <h2>Mis Tareas</h2>
        <input
          type="text"
          id="input-tarea"
          placeholder="Escribe una tarea..."
        />
        <button id="btn-anadir">Añadir Tarea</button>
        <ul id="lista-tareas"></ul>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
